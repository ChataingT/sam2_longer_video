image: docker:latest

services:
  - docker:dind

stages:
  - build

variables:
  IMAGE_NAME: nicololaporta/sam2.1_lv_service

before_script:
  - docker login -u "$DOCKERHUB_USERNAME" -p "$DOCKERHUB_TOKEN"

build_docker_image:
  stage: build
  only:
    - dev-sam-service
  script:
    - docker buildx build -t $IMAGE_NAME:20260414 --push .

